name: Reusable NX Release PR

on:
  workflow_call:
    inputs:
      release-branch:
        description: 'Branch name for the release PR'
        type: string
        default: 'release'
      base:
        description: 'Base branch for the PR (defaults to repository default branch)'
        type: string
        default: ''
      pr-title:
        description: 'Pull request title'
        type: string
        default: 'chore(release): release packages'
      banner:
        description: 'Markdown banner prepended to the PR body'
        type: string
        default: ''
      commit-message:
        description: 'Git commit message for the version bump'
        type: string
        default: 'chore(release): prepare release'
      label:
        description: 'Label to apply to the PR'
        type: string
        default: 'release'
      node-version-file:
        description: 'Path to .node-version or .nvmrc file'
        type: string
        default: '.node-version'
    outputs:
      pr-url:
        description: 'URL of the created/updated PR'
        value: ${{ jobs.create-release-pr.outputs.pr-url }}
      pr-number:
        description: 'Number of the created/updated PR'
        value: ${{ jobs.create-release-pr.outputs.pr-number }}

concurrency:
  group: release-pr
  cancel-in-progress: true

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    outputs:
      pr-url: ${{ steps.nx-release-pr.outputs.pr-url }}
      pr-number: ${{ steps.nx-release-pr.outputs.pr-number }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RC_BOT_APP_ID }}
          private-key: ${{ secrets.RC_BOT_PRIVATE_KEY }}

      - name: Get bot user ID
        id: bot-identity
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm

      - run: pnpm install

      - id: nx-release-pr
        uses: ./nx-release-pr
        with:
          release-branch: ${{ inputs.release-branch }}
          base: ${{ inputs.base }}
          pr-title: ${{ inputs.pr-title }}
          banner: ${{ inputs.banner }}
          commit-message: ${{ inputs.commit-message }}
          label: ${{ inputs.label }}
          token: ${{ steps.app-token.outputs.token }}
          git-user-name: '${{ steps.app-token.outputs.app-slug }}[bot]'
          git-user-email: '${{ steps.bot-identity.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
