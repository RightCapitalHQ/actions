name: Reusable NX Release

on:
  workflow_call:
    inputs:
      create-release:
        description: 'Whether to create GitHub releases'
        type: boolean
        default: true
      dry-run:
        description: 'Run without making any changes'
        type: boolean
        default: false
      node-version-file:
        description: 'Path to .node-version or .nvmrc file'
        type: string
        default: '.node-version'
    secrets:
      token:
        description: 'GitHub token for creating releases and pushing tags'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.token }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm

      - run: pnpm install

      - uses: ./nx-release
        with:
          token: ${{ secrets.token }}
          create-release: ${{ inputs.create-release }}
          dry-run: ${{ inputs.dry-run }}
