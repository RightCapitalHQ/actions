name: Reusable NX Release

on:
  workflow_call:
    inputs:
      create-release:
        description: 'Whether to create GitHub releases'
        type: boolean
        default: true
      dry-run:
        description: 'Run without making any changes'
        type: boolean
        default: false
      publish:
        description: 'Whether to publish packages to npm'
        type: boolean
        default: false
      node-version-file:
        description: 'Path to .node-version or .nvmrc file'
        type: string
        default: '.node-version'
    secrets:
      token:
        description: 'GitHub token for creating releases and pushing tags'
        required: true
    outputs:
      new-tags:
        description: 'JSON array of newly created git tags'
        value: ${{ jobs.release.outputs.new-tags }}
      published:
        description: 'Whether packages were published to npm'
        value: ${{ jobs.release.outputs.published }}
      published-packages:
        description: 'JSON array of published packages [{name, version}]'
        value: ${{ jobs.release.outputs.published-packages }}

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new-tags: ${{ steps.nx-release.outputs.new-tags }}
      published: ${{ steps.nx-release.outputs.published }}
      published-packages: ${{ steps.nx-release.outputs.published-packages }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.token }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm

      - run: pnpm install

      - id: nx-release
        uses: ./nx-release
        with:
          token: ${{ secrets.token }}
          create-release: ${{ inputs.create-release }}
          dry-run: ${{ inputs.dry-run }}
          publish: ${{ inputs.publish }}
