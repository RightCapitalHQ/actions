name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true
      && github.event.pull_request.head.ref == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RC_BOT_APP_ID }}
          private-key: ${{ secrets.RC_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install

      - id: nx-release
        uses: ./nx-release
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Update major version tags
        if: steps.nx-release.outputs.new-tags != '[]'
        env:
          NEW_TAGS: ${{ steps.nx-release.outputs.new-tags }}
        run: node scripts/update-major-tags.ts "$NEW_TAGS"
