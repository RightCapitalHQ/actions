name: Reusable NX Release Auto Plan

on:
  workflow_call:
    inputs:
      bump-header:
        description: 'Commit message header prefix for bump type detection'
        type: string
        default: 'Nx-version-bump: '
      node-version-file:
        description: 'Path to .node-version or .nvmrc file'
        type: string
        default: '.node-version'
    outputs:
      amended:
        description: 'Whether the commit was amended'
        value: ${{ jobs.auto-plan.outputs.amended }}
      bump-type:
        description: 'The detected bump type'
        value: ${{ jobs.auto-plan.outputs.bump-type }}

jobs:
  auto-plan:
    runs-on: ubuntu-latest
    outputs:
      amended: ${{ steps.auto-plan.outputs.amended }}
      bump-type: ${{ steps.auto-plan.outputs.bump-type }}
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RC_BOT_APP_ID }}
          private-key: ${{ secrets.RC_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 2
          token: ${{ steps.app-token.outputs.token }}

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: pnpm

      - run: pnpm install

      - id: auto-plan
        uses: ./nx-release-auto-plan
        with:
          bump-header: ${{ inputs.bump-header }}
