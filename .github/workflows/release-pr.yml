name: Release PR

on:
  push:
    branches: [main]
    paths:
      - '.nx/version-plans/**'
  workflow_dispatch:

jobs:
  generate-token:
    runs-on: ubuntu-latest
    outputs:
      token: ${{ steps.app-token.outputs.token }}
      app-slug: ${{ steps.app-token.outputs.app-slug }}
      bot-user-id: ${{ steps.get-user-id.outputs.user-id }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RC_BOT_APP_ID }}
          private-key: ${{ secrets.RC_BOT_PRIVATE_KEY }}

      - name: Get bot user ID
        id: get-user-id
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

  release-pr:
    needs: generate-token
    uses: ./.github/workflows/nx-release-pr.yml
    with:
      pr-title: 'chore(release): release packages'
      git-user-name: '${{ needs.generate-token.outputs.app-slug }}[bot]'
      git-user-email: '${{ needs.generate-token.outputs.bot-user-id }}+${{ needs.generate-token.outputs.app-slug }}[bot]@users.noreply.github.com'
    secrets:
      token: ${{ needs.generate-token.outputs.token }}
