name: 'nx-release-pr'
description: 'Create or update a release PR for an Nx-managed monorepo'
inputs:
  release-branch:
    description: 'Branch name for the release PR (e.g. "release")'
    required: false
    default: 'release'
  base:
    description: 'Base branch for the PR (defaults to repository default branch)'
    required: false
    default: ''
  pr-title:
    description: 'Pull request title'
    required: true
  banner:
    description: 'Optional markdown banner prepended to the PR body'
    required: false
    default: ''
  commit-message:
    description: 'Git commit message for the version bump commit'
    required: false
    default: 'chore(release): prepare release'
  label:
    description: 'Label to apply to the PR'
    required: false
    default: 'release'
  token:
    description: 'GitHub token for git push and PR operations'
    required: true
  git-user-name:
    description: 'Git user.name for the version bump commit'
    required: false
    default: 'GitHub Actions[bot]'
  git-user-email:
    description: 'Git user.email for the version bump commit'
    required: false
    default: 'npm-publisher@rightcapital.com'
  post-version-command:
    description: 'Command to run after version bumping and changelog generation, before committing. Receives NX_RELEASE_PR_BUMPED_PACKAGES and NX_RELEASE_PR_PROJECT_PACKAGES as env vars (JSON arrays of {name, version, oldVersion}).'
    required: false
    default: ''
outputs:
  pr-url:
    description: 'URL of the created or updated PR'
  pr-number:
    description: 'Number of the created or updated PR'
  bumped-packages:
    description: 'JSON array of bumped packages [{name, version, oldVersion}]'
  project-packages:
    description: 'JSON array of all project packages [{name, version, oldVersion}]'
runs:
  using: 'node24'
  main: 'dist/index.js'
